name: Bug Report
description: Report a ViaFabricPlus bug or issue
labels: [ S-needs-triage, T-bug ]

body:
  - type: markdown
    attributes:
      value: |
        **Before reporting a bug, please check whether the latest build from https://ci.viaversion.com/view/Platforms/job/ViaFabricPlus/ resolves your issue.**

        You can upload screenshots or videos in any text field when relevant.

  - type: textarea
    attributes:
      label: General Information
      description: |
        Go to `Multiplayer -> ViaFabricPlus -> Report Issues`, click `Create a ViaVersion dump`, and paste the generated link here.

        Then click `Open Logs Folder`, upload `latest.log` to mclo.gs, and paste the link here.
      placeholder: |
        ViaVersion dump URL: paste here
        (Alternative: screenshot of your mods folder): paste here
        latest.log URL (mclo.gs): paste here
    validations:
      required: true

  - type: textarea
    attributes:
      label: Bug Description
      description: |
        Describe the unexpected behavior.

        If you want to attach screenshots, use the comment field at the bottom of the page.
      placeholder: |
        Example: "Joining server XY causes the game to crash."
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to Reproduce
      description: |
        List the exact steps required to reproduce the issue.

        Please make each step clear and easy to follow.
      placeholder: |
        Example:
        1. Join server XY using Minecraft 1.14.4
        2. The game crashes
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected Behavior
      description: |
        Describe what you expected to happen.

        If the expected behavior is obvious, this field can be left brief.
      placeholder: |
        Example: "The game should not crash when joining server XY."
    validations:
      required: true
